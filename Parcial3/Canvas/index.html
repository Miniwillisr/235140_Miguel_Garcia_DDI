<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <canvas id="lienzo" class="lienzo" width="1000" height="800">
    </canvas>
    <div>
        <button id="btn_pincel">Pincel</button>
        <button id="btn_linea">Linea</button>
        <button id="btn_cuadro">Cuadrado</button>
        <button id="btn_circulo">Circulo</button>
        <button id="btn_corazon">Corazon</button>
        <button id="btn_sticker">Sticker</button>
        <button id="btn_borrador">Borrador</button>

        <div>
            <input type="file" id="input_imagen" accept="image/*">
        </div>

        <div class="grupo-controles">
            <!-- El atributo 'for' enlaza el texto con el ID del input -->
            <label for="color_linea">Relleno:</label>
            <input type="color" id="color_linea" value="#000000" style="margin-right: 5px;">

            <label for="color_relleno">Contorno:</label>
            <input type="color" id="color_relleno" value="#ffffff" style="margin-right: 5px;">

            <label for="grosor_linea">Grosor:</label>
            <input type="range" id="grosor_linea" min="1" max="50" value="5" style="margin-right: 5px;">
        </div>


        <button id="btn_bn">Filtro B/N</button>
        <button id="btn_rojo">Escala de rojos</button>
        <button id="btn_verde">Escala de verdes</button>
        <button id="btn_azul">Escala de azules</button>
        <button id="btn_sepia">Sepia</button>
        <button id="btn_negativo">Negativo</button>

        <button id="btn_limpiar">Limpiar</button>
        <button id="btn_guardar">Guardar</button>
        <button id="btn_deshacer">Deshacer</button>
        <button id="btn_rehacer">Rehacer</button>

    </div>
</body>
<script type="module" src="js/script.js"></script>

</html>
