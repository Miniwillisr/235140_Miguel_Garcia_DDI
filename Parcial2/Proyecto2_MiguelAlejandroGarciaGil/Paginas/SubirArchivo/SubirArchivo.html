    <main class="peli-main">
        <div class="upload-container">
            <h2>Actualizar Cartelera</h2>
            <p>Selecciona el archivo JSON con la información de las películas para subirlo al sistema.</p>
            
            <form id="formSubirArchivo">
                <div class="drop-zone">
                    <span class="drop-icon">📁</span>
                    <input type="file" id="archivoJSON" accept=".json" required>
                </div>
                <div class="botones-form">
                    <button type="button" class="btn-confirmar" id="btnCargarJSON">Cargar Reseñas</button>
                </div>
            </form>
        </div>
    </main>
