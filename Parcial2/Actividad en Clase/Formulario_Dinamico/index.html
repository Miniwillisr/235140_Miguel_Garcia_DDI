<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularios Dinamicos</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <form action="">
        <label for="nombre">Nombre: </label>
        <input type="text" name="nombre" placeholder="Ingresa un Nombre" id="input-txt-nombre">
        <br>
        <label for="apellido">Apellido: </label>
        <input type="text" name="apellido" placeholder="Ingresa un Apellido" id="input-txt-apellido">
        <br>
        <label for="correo">Correo: </label>
        <input type="email" name="correo" placeholder="Ingresa un Correo" id="input-correo">
        <br>
        <label for="contraseña">Contraseña: </label>
        <input type="password" name="contraseña" placeholder="Ingresa una Contraseña" id="input-contraseña">
        <br>

        <label for="cantidad_correos">Ingresa la cantidad de correos a ingresar</label>
        <input type="number" name="cantidad_correos" id="cantidad_correos" onchange="cambiarNumero(event)"> <!--read only no deja ingresar datos -->
        <br>
        <div class="contenedor_correos" id="contenedor_correos">
        </div>
        
        <div id="contenedor_usuarios">
        </div>
        <br>
        <button id="btn-confi">Guardar Datos</button>
    </form>

    <form id="form_2">
        <br>
        <label for="nombre">Nombre: </label>
        <input type="text" name="nombre" placeholder="Nombre">
        <br>
        <label for="apellido">Apellido: </label>
        <input type="text" name="apellido" placeholder="Apellido">
        <br>
        <label for="correo">Correo: </label>
        <input type="email" name="correo" placeholder="Correo">
        <br>
        <label for="contraseña">Contraseña: </label>
        <input type="password" name="contraseña" placeholder="Contraseña">
        <br>
        <button type="button" onclick="leerDatos()" id="btn-confi2">Guardar</button>

    </form>

</body>
<script src="js/script.js"></script>
</html>
