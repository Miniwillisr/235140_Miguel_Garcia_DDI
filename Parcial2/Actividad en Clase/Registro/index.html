<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="inicio">
        <form id="formInicio">
            <h1>Iniciar Sesion</h1>
            <label>Correo: </label>
            <input type="email" name="correo" placeholder="Ingresa un Correo" id="inicio-correo">
            
            <label>Contraseña: </label>
            <input type="password" name="contraseña" placeholder="Ingresa una contraseña" id="inicio-contra">
            
            <button type="button" id="btn-confi" onclick="leerDatos()">Iniciar Sesion</button>
            <button type="button" id="btn-regis" onclick="mostrarRegistro()">Registro</button>
        </form>
    </div>
    <div id="registro" style="display: none;">
        <form id="formRegistro">
            <h1>Registro</h1>
            <label for="regUsuario">Usuario: </label> <!-- El for Hace que al dar click al texto el usuario vaya a la caja de texto -->
            <input type="text" id="regUsuario" placeholder="Usuario">

            <label for="regApellido">Apellido: </label>
            <input type="text" id="regApellido" placeholder="Apellido">

            <label for="regCorreo">Correo: </label>
            <input type="email" id="regCorreo" placeholder="Correo">

            <label for="regContra">Contraseña: </label>
            <input type="password" id="regContra" placeholder="Contraseña">

            <label for="regContra2">Confirmar Contraseña: </label>
            <input type="password" id="regContra2" placeholder="Confirmar contraseña">
        </form>
            <button type="button" onclick="regUsuario()">Guardar</button>
            <button type="button" onclick="volverLogin()">Volver</button>
    </div>


</body>
<script src="js/script.js"></script>

</html>
